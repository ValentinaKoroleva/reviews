name: Deploy to GitHub pages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'true'
          fetch-depth: 0 # Fetch all history
      - name: Apply configurations
        run: |
          cp quartz.config.yaml quartz
          cp -rf content/* quartz/content/
          cp content/static/og-image.png quartz/quartz/static/og-image.png
          cp scripts/install-quartz-plugins.ts quartz
          # Fix Quartz v5 bug: collectComponents passes undefined to allComponents when footer is disabled
          sed -i 's/seen\.add(c)/if (c) seen.add(c)/' quartz/quartz/plugins/pageTypes/dispatcher.ts
          # Fix Explorer links: add data-basepath to <body> so links include the subpath (/reviews)
          cp scripts/renderPage.tsx quartz/quartz/components/renderPage.tsx
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: quartz/package-lock.json
      - name: Install Node.js dependencies
        working-directory: quartz
        run: npm ci
      - name: Cache Quartz plugins
        uses: actions/cache@v5
        with:
          path: quartz/.quartz/plugins
          key: quartz-plugins-${{ hashFiles('quartz.config.yaml') }}
      - name: Install Quartz plugins
        working-directory: quartz
        run: npx tsx install-quartz-plugins.ts
      - name: Build website
        run: npx quartz build
        working-directory: quartz
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  # Deployment job
  deploy:
    needs: build
    if: ${{ github.ref == 'refs/heads/main'}}
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source
      actions: read     # to download an artifact uploaded by `actions/upload-pages-artifact@v3`
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
